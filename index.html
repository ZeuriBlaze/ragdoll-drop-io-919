        { name: '410e5115a82fe21daf3dff2040631f21.wasm.unityweb', parts: 2 },

    window.config = {

  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>

    var canvas = document.querySelector("#unity-canvas");
    var buildUrl = "Build";
    
    var loaderUrl = buildUrl + "/813700ccfaf64a0a3c57e3aa3166490b.loader.js";
    var config = {
      dataUrl: buildUrl + "/64cbab5583908a093c59d52635bffa4b.data.unityweb",

      companyName: "Ericetto",
      productName: "Ragdoll Drop",
      productVersion: "0.1",
    };

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        console.log("Loading: " + (100 * progress) + "%");
      }).then((unityInstance) => {
        console.log("Game Loaded");
      }).catch((message) => {
        alert(message);
      });
    };
    document.body.appendChild(script);
